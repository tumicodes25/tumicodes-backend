services:
  # Backend API Service
  - type: web
    name: tumicodes-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: tumicodes@gmail.com
      - key: ADMIN_PASSWORD
        value: tumicodes25
      # Database credentials will be linked from the database service
      - key: DB_HOST
        fromDatabase:
          name: tumicodes-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: tumicodes-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: tumicodes-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: tumicodes-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: tumicodes-db
          property: database
      - key: SENDGRID_API_KEY
        value: ""
      - key: FROM_EMAIL
        value: no-reply@tumicodes.com
      - key: FRONTEND_URL
        value: https://your-frontend.example
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: data
      mountPath: /data
      sizeGB: 1

  # MySQL Database Service
  - type: pserv
    name: tumicodes-db
    env: docker
    disk:
      name: data
      mountPath: /var/lib/mysql
      sizeGB: 10
    dockerfilePath: ./dockerfile.mysql
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
      - key: MYSQL_DATABASE
        value: tumicodes
      - key: MYSQL_USER
        value: tumicodes_user
      - key: MYSQL_PASSWORD
        generateValue: true
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all (for Render services)
    scaling:
      maxInstances: 1
      minInstances: 1

# Database initialization script
databases:
  - name: tumicodes-db
    databaseName: tumicodes
    user: tumicodes_user